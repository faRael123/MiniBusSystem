<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Correct Flask static path -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <div class="container">
        <div class="login-box">

            <div class="logo-section">
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>

            <!-- Form -->
            <form class="login-form" method="POST" autocomplete="on">

                <div class="form-group">
                    <label for="username">Email or Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username"
                        placeholder="Enter your email or username" 
                        autocapitalize="none" 
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password" 
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" id="togglePassword" class="toggle-password" aria-label="Show/Hide Password">👁️</button>
                    </div>
                </div>

                <div class="helper-links" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <a href="{{ url_for('forgot_password') }}" class="text-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>


            </form>

            <!-- Error message -->
            {% if error %}
                <p style="color:red; margin-top:10px;">{{ error }}</p>
            {% endif %}

        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');

        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
        });
    </script>

</body>
</html>
